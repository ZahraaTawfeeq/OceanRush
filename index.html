<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocean Rush 🐳</title>

    <link rel="stylesheet" href="./css/style.css">
    <script defer src="./js/app.js"></script>
</head>

<body>

    <div id="container">
        <!-- Lives and Score Section -->
        <div id="score-lives-cont">
            <p id="score">Score: </p>
            <p id="lives">Lives:</p>
        </div>

        <!-- Game Container -->
        <div id="game-container">
            <p id="falling-objects"></p>
            <p id="net-object">🦀</p>
        </div>

        <!-- Start Screen -->
        <div id="start-screen" class="overlay">
            <h1>🌊 Ocean Rush 🌊</h1>
            <p>Catch the fish and avoid the sharks!</p>
            <button id="start-btn">Start Game</button>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="overlay hidden">
            <h1>Game Over!</h1>
            <p>Your Score</p>
            <p id="final-score"></p>
            <button id="play-again-btn" class="play-again">Play Again</button>
        </div>

        <!-- Win screen -->
        <div id="win-screen" class="overlay hidden">
            <h1>You Win!</h1>
            <p>Congrats You got a high score!</p>
            <p id="final-score"></p>
            <button id="play-again-btn" class="play-again">Play Again</button>
        </div>
    </div>

</body>

</html>
